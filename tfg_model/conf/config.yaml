defaults:
  - _self_

experiment_name: "conjecturer_prover_v1"
seed: 42

dataset:
  path: "data/conjecturer_dataset"
  variables: [ "A", "B", "C", "D", "E" ]
  conjectures: [ 
    "A -> A", "B -> B", "C -> C", "D -> D", "E -> E", 
    "(B -> A) -> (C -> B) -> C -> A", "(B -> E) -> (D -> B) -> D -> E"
    ]

training:
  max_episodes: 10000
  batch_size: 64
  replay_buffer_size: 50000
  
env:
  max_iterations: 10           # Max steps before forcing a termination
  num_node_categories: 3       # Categories the Prover can assign
  starting_challenge: "A -> A"

model:
  body:
    hidden_dim: 126
    num_gnn_layers: 4
    dropout: 0.1
    learning_rate: 3e-4
  conjecturer:
    learning_rate: 3e-4
    target_difficulty: 1.5     # The target loss threshold for the Prover
  prover:
    learning_rate: 1e-3
    label_smoothing: 0.1

hydra:
  job_logging:
    formaters:
      simple:
        format: "[%(levelname)s] [%(name)s]: %(message)s"
    handlers:
      console:
        formatter: simple