experiment_name: conjecturer_prover_v1
seed: 42
training:
  max_episodes: 10000
  batch_size: 64
  replay_buffer_size: 50000
  optimizer: adamw
env:
  max_iterations: 10
  num_node_categories: 3
model:
  body:
    hidden_dim: 126
    num_gnn_layers: 4
    dropout: 0.1
  conjecturer:
    learning_rate: 0.0003
    target_difficulty: 1.5
  prover:
    learning_rate: 0.001
    label_smoothing: 0.1
